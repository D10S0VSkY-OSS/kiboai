name: Publish to TestPyPI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build and upload to TestPyPI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5.1.0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11" # Matches pyproject.toml >=3.11

    - name: Bump version (dev timestamp)
      id: bump_version
      run: |
        # Get current version
        CURRENT_VERSION=$(grep 'version = "' pyproject.toml | head -n 1 | cut -d'"' -f2)
        
        # Append timestamp for unique dev version
        TIMESTAMP=$(date +%Y%m%d%H%M%S)
        NEW_VERSION="${CURRENT_VERSION}.dev${TIMESTAMP}"
        
        echo "Bumping version from $CURRENT_VERSION to $NEW_VERSION"
        sed -i 's/version = "'"$CURRENT_VERSION"'"/version = "'"$NEW_VERSION"'"/' pyproject.toml
        
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Build package
      run: uv build

    - name: Publish to TestPyPI
      run: uv publish --publish-url https://test.pypi.org/legacy/ --token ${{ secrets.TESTPYPI }}
